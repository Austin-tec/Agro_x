<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Listing - AgroX Platform</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../css/style.css">
    <link rel="stylesheet" href="../../css/marketplace.css">
    <style>
        .add-listing-container {
            max-width: 900px;
            margin: 120px auto 40px;
            background: var(--dark-gray);
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .form-header {
            background: linear-gradient(135deg, var(--primary-color), rgba(60, 150, 60, 0.7));
            padding: 40px 20px;
            text-align: center;
            color: white;
        }
        
        .form-header h1 {
            margin: 0 0 10px;
            font-size: 28px;
        }
        
        .form-header p {
            margin: 0;
            opacity: 0.9;
            font-size: 14px;
        }
        
        .form-content {
            padding: 40px;
        }
        
        .form-step {
            display: none;
        }
        
        .form-step.active {
            display: block;
        }
        
        .form-group {
            margin-bottom: 25px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--white);
        }
        
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            color: var(--white);
            font-family: inherit;
        }
        
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--primary-color);
            background: rgba(60, 150, 60, 0.05);
        }
        
        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        
        .certification-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
        }
        
        .certification-item {
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
        }
        
        .certification-item:hover {
            border-color: var(--primary-color);
            background: rgba(60, 150, 60, 0.1);
        }
        
        .certification-item.selected {
            border-color: var(--primary-color);
            background: rgba(60, 150, 60, 0.2);
        }
        
        .certification-item input {
            display: none;
        }
        
        .certification-item i {
            display: block;
            font-size: 24px;
            margin-bottom: 8px;
            color: var(--primary-color);
        }
        
        .form-actions {
            display: flex;
            justify-content: space-between;
            margin-top: 40px;
            gap: 15px;
        }
        
        .form-actions .btn {
            flex: 1;
        }
        
        .progress-bar {
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            overflow: hidden;
            margin-bottom: 30px;
        }
        
        .progress-fill {
            height: 100%;
            background: var(--primary-color);
            transition: width 0.3s;
        }
        
        .form-indicator {
            font-size: 13px;
            color: var(--light-gray);
            margin-bottom: 15px;
        }
        
        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
            }
            
            .form-content {
                padding: 20px;
            }
            
            .certification-list {
                grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            }
            
            .form-actions {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="navbar">
        <div class="container nav-inner">
            <a href="index.html" class="logo">
                <div class="logo-icon"><i class="fas fa-seedling"></i></div>
                <div class="logo-text">Agro<span>X</span></div>
            </a>

            <nav class="nav-links">
                <a href="index.html">Home</a>
                <a href="marketplace.html">Marketplace</a>
                <a href="my-listings.html">My Listings</a>
            </nav>

            <div class="nav-cta">
                <div class="user-menu">
                    <button class="user-button">
                        <i class="fas fa-user"></i>
                        <span id="user-name">User</span>
                        <i class="fas fa-chevron-down"></i>
                    </button>
                    <div class="user-dropdown">
                        <a href="#" id="logout-btn"><i class="fas fa-sign-out-alt"></i> Logout</a>
                    </div>
                </div>
            </div>

            <div class="menu-toggle" id="menuToggle">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main>
        <div class="add-listing-container">
            <div class="form-header">
                <h1><i class="fas fa-plus"></i> Add New Listing</h1>
                <p>Create a product listing to reach potential buyers</p>
            </div>

            <div class="form-content">
                <div class="form-indicator">
                    Step <span id="step-number">1</span> of 4
                </div>
                
                <div class="progress-bar">
                    <div class="progress-fill" id="progress-fill"></div>
                </div>

                <!-- Step 1: Basic Information -->
                <form id="listing-form">
                    <!-- Step 1 -->
                    <div class="form-step active" id="step-1">
                        <h2>Basic Information</h2>
                        
                        <div class="form-group">
                            <label for="listing-title">Product Title *</label>
                            <input type="text" id="listing-title" placeholder="e.g., Fresh Tomatoes" required>
                        </div>
                        
                        <div class="form-group">
                            <label for="listing-category">Category *</label>
                            <select id="listing-category" required>
                                <option value="">Select a category</option>
                                <option value="vegetables">Vegetables</option>
                                <option value="fruits">Fruits</option>
                                <option value="grains">Grains</option>
                                <option value="dairy">Dairy Products</option>
                                <option value="livestock">Livestock</option>
                            </select>
                        </div>
                        
                        <div class="form-group">
                            <label for="listing-description">Description *</label>
                            <textarea id="listing-description" placeholder="Describe your product in detail..." required></textarea>
                        </div>
                    </div>

                    <!-- Step 2: Pricing & Quantity -->
                    <div class="form-step" id="step-2">
                        <h2>Pricing & Quantity</h2>
                        
                        <div class="form-row">
                            <div class="form-group">
                                <label for="listing-price">Price *</label>
                                <input type="number" id="listing-price" placeholder="0.00" step="0.01" required>
                            </div>
                            
                            <div class="form-group">
                                <label for="listing-price-unit">Price Unit *</label>
                                <select id="listing-price-unit" required>
                                    <option value="per kg">Per kg</option>
                                    <option value="per unit">Per unit</option>
                                    <option value="per dozen">Per dozen</option>
                                    <option value="per crate">Per crate</option>
                                </select>
                            </div>
                        </div>
                        
                        <div class="form-row">
                            <div class="form-group">
                                <label for="listing-quantity">Available Quantity *</label>
                                <input type="number" id="listing-quantity" placeholder="0" required>
                            </div>
                            
                            <div class="form-group">
                                <label for="listing-unit">Unit *</label>
                                <select id="listing-unit" required>
                                    <option value="kg">kg</option>
                                    <option value="tons">tons</option>
                                    <option value="units">units</option>
                                    <option value="liters">liters</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <!-- Step 3: Location & Availability -->
                    <div class="form-step" id="step-3">
                        <h2>Location & Availability</h2>
                        
                        <div class="form-group">
                            <label for="listing-location">Location *</label>
                            <input type="text" id="listing-location" placeholder="e.g., Lagos, Nigeria" required>
                        </div>
                        
                        <div class="form-group">
                            <label for="listing-harvest-date">Harvest/Production Date</label>
                            <input type="date" id="listing-harvest-date">
                        </div>
                        
                        <div class="form-group">
                            <label for="listing-availability">Availability Period *</label>
                            <select id="listing-availability" required>
                                <option value="">Select availability</option>
                                <option value="limited">Limited (specify days)</option>
                                <option value="seasonal">Seasonal</option>
                                <option value="year-round">Year Round</option>
                            </select>
                        </div>
                    </div>

                    <!-- Step 4: Certifications & Review -->
                    <div class="form-step" id="step-4">
                        <h2>Certifications & Review</h2>
                        
                        <div class="form-group">
                            <label>Product Certifications</label>
                            <div class="certification-list">
                                <label class="certification-item">
                                    <input type="checkbox" value="organic">
                                    <i class="fas fa-leaf"></i>
                                    <span>Organic</span>
                                </label>
                                <label class="certification-item">
                                    <input type="checkbox" value="gmo-free">
                                    <i class="fas fa-check-double"></i>
                                    <span>GMO-Free</span>
                                </label>
                                <label class="certification-item">
                                    <input type="checkbox" value="fair-trade">
                                    <i class="fas fa-handshake"></i>
                                    <span>Fair Trade</span>
                                </label>
                                <label class="certification-item">
                                    <input type="checkbox" value="certified">
                                    <i class="fas fa-certificate"></i>
                                    <span>Certified</span>
                                </label>
                            </div>
                        </div>
                        
                        <div class="form-group">
                            <h3>Listing Preview</h3>
                            <div id="listing-preview" style="background: rgba(255, 255, 255, 0.05); padding: 20px; border-radius: 6px; margin-top: 15px;">
                                <p style="text-align: center; color: var(--light-gray);">Preview will show here</p>
                            </div>
                        </div>
                    </div>

                    <!-- Form Actions -->
                    <div class="form-actions">
                        <button type="button" class="btn ghost nav-btn prev" style="display: none;">
                            <i class="fas fa-arrow-left"></i> Previous
                        </button>
                        <button type="button" class="btn primary nav-btn next">
                            Next <i class="fas fa-arrow-right"></i>
                        </button>
                        <button type="submit" class="btn success" id="submit-btn" style="display: none;">
                            <i class="fas fa-check"></i> Create Listing
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <script src="../../js/add-listing.js"></script>
</body>
</html>

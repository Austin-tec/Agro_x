<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Listings - AgroX Platform</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../css/style.css">
    <link rel="stylesheet" href="../../css/marketplace.css">
    <style>
        .listings-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        
        .listings-header h2 {
            font-size: 24px;
            font-weight: 600;
            margin: 0;
        }
        
        #empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--light-gray);
        }
        
        #empty-state i {
            font-size: 64px;
            margin-bottom: 20px;
            opacity: 0.5;
        }
        
        #empty-state h3 {
            margin: 20px 0 10px;
            font-size: 20px;
        }
        
        .listing-card {
            background: var(--dark-gray);
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
            display: flex;
            gap: 20px;
            padding: 20px;
            margin-bottom: 15px;
        }
        
        .listing-card:hover {
            border-color: var(--primary-color);
            box-shadow: 0 5px 15px rgba(60, 150, 60, 0.2);
        }
        
        .listing-image {
            width: 100px;
            height: 100px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            color: var(--primary-color);
            flex-shrink: 0;
        }
        
        .listing-info {
            flex: 1;
        }
        
        .listing-title {
            font-size: 18px;
            font-weight: 600;
            margin: 0 0 5px;
            color: var(--white);
        }
        
        .listing-category {
            font-size: 12px;
            color: var(--light-gray);
            margin: 0 0 10px;
            text-transform: uppercase;
        }
        
        .listing-details {
            display: flex;
            gap: 20px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }
        
        .detail-item {
            font-size: 14px;
            color: var(--light-gray);
        }
        
        .detail-item i {
            color: var(--primary-color);
            margin-right: 5px;
        }
        
        .listing-stats {
            display: flex;
            gap: 15px;
        }
        
        .stat {
            font-size: 13px;
            padding: 5px 10px;
            border-radius: 5px;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .stat.approved {
            background: rgba(60, 150, 60, 0.2);
            color: var(--primary-color);
        }
        
        .stat.pending {
            background: rgba(255, 193, 7, 0.2);
            color: #ffc107;
        }
        
        .listing-actions {
            display: flex;
            gap: 10px;
            flex-direction: column;
            justify-content: center;
        }
        
        .listing-actions .btn {
            padding: 8px 16px;
            font-size: 13px;
            white-space: nowrap;
        }
        
        #listings-container {
            display: flex;
            flex-direction: column;
        }
        
        .filters-section {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        
        .filters-section select,
        .filters-section input {
            padding: 10px 15px;
            background: var(--dark-gray);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            color: var(--white);
            font-size: 14px;
        }
        
        .filters-section select:focus,
        .filters-section input:focus {
            outline: none;
            border-color: var(--primary-color);
        }
        
        @media (max-width: 768px) {
            .listing-card {
                flex-direction: column;
            }
            
            .listing-image {
                width: 100%;
            }
            
            .listing-actions {
                flex-direction: row;
            }
            
            .listings-header {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="navbar">
        <div class="container nav-inner">
            <a href="index.html" class="logo">
                <div class="logo-icon"><i class="fas fa-seedling"></i></div>
                <div class="logo-text">Agro<span>X</span></div>
            </a>

            <nav class="nav-links">
                <a href="index.html">Home</a>
                <a href="marketplace.html">Marketplace</a>
                <a href="messages.html">Messages</a>
                <a href="my-listings.html" class="active">My Listings</a>
            </nav>

            <div class="nav-cta">
                <div class="user-menu">
                    <button class="user-button">
                        <i class="fas fa-user"></i>
                        <span id="user-name">User</span>
                        <i class="fas fa-chevron-down"></i>
                    </button>
                    <div class="user-dropdown">
                        <a href="#" id="logout-btn"><i class="fas fa-sign-out-alt"></i> Logout</a>
                    </div>
                </div>
            </div>

            <div class="menu-toggle" id="menuToggle">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="marketplace-container">
        <div class="container">
            <!-- Page Header -->
            <div class="marketplace-header">
                <div class="marketplace-title">
                    <h1>My Listings</h1>
                    <p>Manage and track your active product listings</p>
                </div>
            </div>
            
            <!-- Filters -->
            <div class="filters-section">
                <input type="text" id="search-listings" placeholder="Search listings...">
                <select id="category-filter">
                    <option value="all">All Categories</option>
                    <option value="vegetables">Vegetables</option>
                    <option value="fruits">Fruits</option>
                    <option value="grains">Grains</option>
                    <option value="dairy">Dairy</option>
                    <option value="livestock">Livestock</option>
                </select>
                <select id="status-filter">
                    <option value="all">All Status</option>
                    <option value="active">Active</option>
                    <option value="inactive">Inactive</option>
                </select>
            </div>
            
            <!-- Listings Header -->
            <div class="listings-header">
                <h2>Your Listings</h2>
                <a href="add-listing.html" class="btn primary" id="add-new-listing">
                    <i class="fas fa-plus"></i> Add New Listing
                </a>
            </div>
            
            <!-- Empty State -->
            <div id="empty-state" style="display: none;">
                <i class="fas fa-inbox"></i>
                <h3>No listings yet</h3>
                <p>Start by creating your first listing to reach potential buyers</p>
                <a href="add-listing.html" class="btn primary" id="add-first-listing" style="margin-top: 20px;">
                    <i class="fas fa-plus"></i> Create Your First Listing
                </a>
            </div>
            
            <!-- Listings Container -->
            <div id="listings-container" class="listings-grid">
                <!-- Listings will be loaded here -->
            </div>
        </div>
    </main>

    <!-- Modal for viewing listing details -->
    <div id="listing-modal" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Listing Details</h2>
                <button class="close-btn" id="close-modal">&times;</button>
            </div>
            <div class="modal-body" id="modal-body">
                <!-- Details will be loaded here -->
            </div>
        </div>
    </div>

    <script src="../../js/my-listings.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - AgroX</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif; }
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height:100vh; display:flex; align-items:center; justify-content:center; }
        .login-container { background: white; padding:40px; border-radius:10px; box-shadow:0 10px 30px rgba(0,0,0,0.2); width:100%; max-width:400px; }
        .logo { text-align:center; margin-bottom:20px; }
        .logo i { font-size:40px; color:#667eea; }
        h1 { text-align:center; margin-bottom:30px; color:#333; }
        .form-group { margin-bottom:20px; }
        label { display:block; margin-bottom:5px; color:#666; font-weight:500; }
        input { width:100%; padding:12px 15px; border:2px solid #e0e0e0; border-radius:6px; font-size:16px; transition:border-color 0.3s; }
        input:focus { outline:none; border-color:#667eea; }
        button { width:100%; padding:14px; background:#667eea; color:white; border:none; border-radius:6px; font-size:16px; font-weight:600; cursor:pointer; transition:background 0.3s; }
        button:hover { background:#5a67d8; }
        .error { background:#fee; color:#c33; padding:10px; border-radius:4px; margin-bottom:20px; text-align:center; }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="login-container">
        <div class="logo"><i class="fas fa-seedling"></i></div>
        <h1>Admin Login</h1>
        {% if error %}<div class="error"><i class="fas fa-exclamation-circle"></i> {{ error }}</div>{% endif %}
        <form method="POST">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>
            <button type="submit"><i class="fas fa-sign-in-alt"></i> Login</button>
        </form>
    </div>
</body>
</html>
